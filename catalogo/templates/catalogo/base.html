<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block titulo %}Videoteca Retro{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
        }

        nav {
            background: #16213e;
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            gap: 2rem;
            border-bottom: 2px solid #7b2d8b;
        }

        nav .logo {
            font-size: 1.3rem;
            font-weight: bold;
            color: #c77dff;
            text-decoration: none;
        }

        nav a {
            color: #a0a0c0;
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.2s;
        }

        nav a:hover { color: #c77dff; }

        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        h1 {
            font-size: 1.8rem;
            color: #c77dff;
            margin-bottom: 1.5rem;
        }

        /* Mensajes de éxito / error */
        .messages { margin-bottom: 1rem; }

        .msg {
            padding: 0.75rem 1rem;
            border-radius: 6px;
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }

        .msg.success { background: #1b4332; color: #95d5b2; border-left: 4px solid #52b788; }
        .msg.error   { background: #3d0000; color: #ff8fa3; border-left: 4px solid #e63946; }

        /* Botones */
        .btn {
            display: inline-block;
            padding: 0.5rem 1.1rem;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
            text-decoration: none;
            transition: opacity 0.2s;
        }

        .btn:hover { opacity: 0.85; }
        .btn-primary  { background: #7b2d8b; color: #fff; }
        .btn-success  { background: #2d6a4f; color: #fff; }
        .btn-warning  { background: #b5581a; color: #fff; }
        .btn-danger   { background: #9d0208; color: #fff; }
        .btn-secondary{ background: #444; color: #ddd; }

        /* Tabla */
        table {
            width: 100%;
            border-collapse: collapse;
            background: #16213e;
            border-radius: 8px;
            overflow: hidden;
        }

        thead { background: #7b2d8b; }
        thead th { padding: 0.75rem 1rem; text-align: left; color: #fff; font-weight: 600; }
        tbody tr { border-bottom: 1px solid #2a2a4a; }
        tbody tr:hover { background: #1e1e3a; }
        tbody td { padding: 0.65rem 1rem; font-size: 0.9rem; }

        .plataforma-header {
            background: #0f3460;
            color: #c77dff;
            padding: 0.5rem 1rem;
            font-weight: bold;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
        }

        .badge-biblioteca { color: #95d5b2; }
        .badge-prestado   { color: #ff8fa3; }

        /* Formularios */
        .form-card {
            background: #16213e;
            border-radius: 10px;
            padding: 2rem;
            max-width: 550px;
        }

        .form-group { margin-bottom: 1.2rem; }

        label {
            display: block;
            margin-bottom: 0.35rem;
            font-size: 0.9rem;
            color: #a0a0c0;
        }

        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            padding: 0.55rem 0.8rem;
            border-radius: 6px;
            border: 1px solid #3a3a5a;
            background: #1a1a2e;
            color: #e0e0e0;
            font-size: 0.95rem;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #7b2d8b;
        }

        .form-actions { display: flex; gap: 0.75rem; margin-top: 1.5rem; }

        /* Confirmación borrado */
        .confirm-card {
            background: #16213e;
            border-radius: 10px;
            padding: 2rem;
            max-width: 480px;
            border-left: 4px solid #e63946;
        }

        .confirm-card p { margin: 0.5rem 0 1.5rem; color: #ccc; }
    </style>
</head>
<body>

<nav>
    <a class="logo" href="{% url 'coleccion' %}">🎮 Videoteca Retro</a>
    <a href="{% url 'coleccion' %}">Colección</a>
    <a href="{% url 'añadir_juego' %}">+ Añadir juego</a>
    <a href="{% url 'analisis' %}">Análisis</a>
</nav>

<div class="container">

    {% if messages %}
    <div class="messages">
        {% for message in messages %}
        <div class="msg {{ message.tags }}">{{ message }}</div>
        {% endfor %}
    </div>
    {% endif %}

    {% block contenido %}{% endblock %}

</div>

</body>
</html>
